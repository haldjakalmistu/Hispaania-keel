<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hispaania õpe</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 12px;
    background: rgba(0,0,0,0.25);
}

.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 12px;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: #2e2e5f;
    padding: 20px;
    transition: left 0.3s ease;
    z-index: 10;
}

.sidebar.open { left: 0; }

.sidebar button {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

button {
    padding: 12px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    font-weight: bold;
    width: 90%;
}

.card {
    background: rgba(0,0,0,0.3);
    padding: 40px;
    border-radius: 15px;
    font-size: 22px;
    margin-top: 15px;
    cursor: pointer;
}

.option {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.hidden { display: none; }

.wordlist {
    text-align: left;
    margin-top: 10px;
}

.word {
    background: rgba(0,0,0,0.25);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
    <button onclick="startCards()">📇 Kaardid</button>
    <button onclick="startTest()">📝 Test</button>
    <button onclick="showList()">📖 Sõnaloend</button>
    <button onclick="closeMenu()">❌ Sulge</button>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="openMenu()">☰</div>
    <strong>🇪🇸 Hispaania õppeäpp</strong>
</div>

<div class="container">

<div id="home">
    <p>Vali õppimisviis menüüst</p>
</div>

<div id="cards" class="hidden">
    <div class="card" id="cardBox" onclick="flipCard()">Laeb...</div>
    <button onclick="nextCard()">Järgmine</button>
    <p id="cardInfo"></p>
</div>

<div id="test" class="hidden">
    <p id="question"></p>
    <div id="options"></div>
    <p>Tulemus: <span id="score">0</span></p>
</div>

<div id="list" class="hidden">
    <h3>📖 Sõnaloend (100 sõna)</h3>
    <div id="wordList" class="wordlist"></div>
</div>

</div>

<script>
// ✅ DOM viited (test töötab ka iOS-is)
const question = document.getElementById("question");
const optionsBox = document.getElementById("options");
const scoreSpan = document.getElementById("score");

function openMenu(){ sidebar.classList.add("open"); }
function closeMenu(){ sidebar.classList.remove("open"); }

function showOnly(id){
    ["home","cards","test","list"].forEach(v =>
        document.getElementById(v).classList.add("hidden")
    );
    document.getElementById(id).classList.remove("hidden");
    closeMenu();
}

// ✅ 100 SÕNA
const words = [
{et:"tere",es:"hola"},
{et:"aitäh",es:"gracias"},
{et:"palun",es:"por favor"},
{et:"jah",es:"sí"},
{et:"ei",es:"no"},
{et:"hüvasti",es:"adiós"},
{et:"vabandust",es:"perdón"},
{et:"vesi",es:"agua"},
{et:"toit",es:"comida"},
{et:"maja",es:"casa"},
{et:"pere",es:"familia"},
{et:"sõber",es:"amigo"},
{et:"raha",es:"dinero"},
{et:"aeg",es:"tiempo"},
{et:"armastus",es:"amor"},
{et:"elu",es:"vida"},
{et:"hea",es:"bueno"},
{et:"halb",es:"malo"},
{et:"ilus",es:"bonito"},
{et:"suur",es:"grande"},
{et:"väike",es:"pequeño"},
{et:"külm",es:"frío"},
{et:"kuum",es:"caliente"},
{et:"uus",es:"nuevo"},
{et:"vana",es:"viejo"},
{et:"kiire",es:"rápido"},
{et:"aeglane",es:"lento"},
{et:"kus",es:"dónde"},
{et:"mis",es:"qué"},
{et:"kes",es:"quién"},
{et:"millal",es:"cuándo"},
{et:"miks",es:"por qué"},

{et:"ma söön",es:"como"},
{et:"ma joon",es:"bebo"},
{et:"ma lähen",es:"voy"},
{et:"ma tulen",es:"vengo"},
{et:"ma näen",es:"veo"},
{et:"ma kuulen",es:"oigo"},
{et:"ma räägin",es:"hablo"},
{et:"ma õpin",es:"aprendo"},
{et:"ma puhkan",es:"descanso"},

{et:"ma töötan",es:"trabajo"},

{et:"päev",es:"día"},

{et:"hommik",es:"mañana"},

{et:"linn",es:"ciudad"},
{et:"küla",es:"pueblo"},

{et:"laps",es:"niño"},

{et:"muusika",es:"música"},
{et:"film",es:"película"},

{et:"küsimus",es:"pregunta"},
{et:"vastus",es:"respuesta"}
];

// KAARDID
let shuffled=[],index=0,flipped=false;

function startCards(){
    showOnly("cards");
    shuffled=[...words].sort(()=>Math.random()-0.5);
    index=0; showCard();
}

function showCard(){
    flipped=false;
    cardBox.innerText=shuffled[index].et;
    cardInfo.innerText=`${index+1} / ${shuffled.length}`;
}

function flipCard(){
    cardBox.innerText=flipped?shuffled[index].et:shuffled[index].es;
    flipped=!flipped;
}

function nextCard(){
    index++;
    if(index>=shuffled.length){ alert("Kõik kaardid läbi"); showOnly("home"); }
    else showCard();
}

// ✅ TEST
let score=0,current;

function startTest(){
    showOnly("test");
    score=0; scoreSpan.innerText=0;
    nextQuestion();
}

function nextQuestion(){
    current=words[Math.floor(Math.random()*words.length)];
    question.innerText=current.et;

    let opts=[current.es];
    while(opts.length<4){
        let r=words[Math.floor(Math.random()*words.length)].es;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(()=>Math.random()-0.5);

    optionsBox.innerHTML=opts.map(o=>
        `<button class="option" onclick="check('${o}')">${o}</button>`
    ).join("");
}

function check(a){
    if(a===current.es) score++;
    scoreSpan.innerText=score;
    nextQuestion();
}

// SÕNALOEND
function showList(){
    showOnly("list");
    wordList.innerHTML=words.map(w=>
        `<div class="word"><span>${w.et}</span><strong>${w.es}</strong></div>`
    ).join("");
}
</script>
</body>
</html>
