<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hispaania õpe</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.topbar {
    display: flex;
    align-items: center;
    padding: 12px;
    background: rgba(0,0,0,0.25);
}

.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 12px;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: #2e2e5f;
    padding: 20px;
    transition: left 0.3s ease;
    z-index: 10;
}
.sidebar.open { left: 0; }

.sidebar button {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    font-weight: bold;
    width: 44%;
}

.card {
    background: rgba(0,0,0,0.3);
    padding: 40px;
    border-radius: 15px;
    font-size: 22px;
    margin-top: 15px;
    cursor: pointer;
}

.option {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.hidden { display: none; }

.wordlist {
    text-align: left;
    margin-top: 10px;
}

.word {
    background: rgba(0,0,0,0.25);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 4px;
    display: flex;
    gap: 8px;
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
    <button onclick="startCards()">📇 Kaardid</button>
    <button onclick="startTest()">📝 Test</button>
    <button onclick="showList()">📖 Sõnaloend</button>
    <button onclick="closeMenu()">❌ Sulge</button>
</div>

<div class="topbar">
    <div class="menu-btn" onclick="openMenu()">☰</div>
    <strong>🇪🇸 Hispaania õppeäpp</strong>
</div>

<div class="container">

<div id="home">
    <p>Vali õppimisviis menüüst</p>
</div>

<div id="cards" class="hidden">
    <div class="card" id="cardBox" onclick="flipCard()">Laeb...</div>
    <p id="cardInfo"></p>
    <button onclick="prevCard()">⬅ Eelmine</button>
    <button onclick="nextCard()">➡ Järgmine</button>
</div>

<div id="test" class="hidden">
    <p id="question"></p>
    <div id="options"></div>
    <p>Tulemus: <span id="score">0</span></p>
    <button onclick="prevQuestion()">⬅ Eelmine</button>
    <button onclick="nextQuestion()">➡ Järgmine</button>
</div>

<div id="list" class="hidden">
    <h3>📖 Sõnaloend (100 sõna)</h3>
    <div id="wordList" class="wordlist"></div>
</div>

</div>

<script>
const question = document.getElementById("question");
const optionsBox = document.getElementById("options");
const scoreSpan = document.getElementById("score");

function openMenu(){ sidebar.classList.add("open"); }
function closeMenu(){ sidebar.classList.remove("open"); }

function showOnly(id){
    ["home","cards","test","list"].forEach(v =>
        document.getElementById(v).classList.add("hidden")
    );
    document.getElementById(id).classList.remove("hidden");
    closeMenu();
}

/* ✅ TÄPSELT 100 UNIKAALSET SÕNA */
const words = [
{et:"tere",es:"hola"}, {et:"aitäh",es:"gracias"}, {et:"palun",es:"por favor"},
{et:"jah",es:"sí"}, {et:"ei",es:"no"}, {et:"hüvasti",es:"adiós"},
{et:"vabandust",es:"perdón"}, {et:"vesi",es:"agua"}, {et:"toit",es:"comida"},
{et:"maja",es:"casa"}, {et:"pere",es:"familia"}, {et:"sõber",es:"amigo"},
{et:"laps",es:"niño"}, {et:"ema",es:"madre"}, {et:"isa",es:"padre"},
{et:"vend",es:"hermano"}, {et:"õde",es:"hermana"}, {et:"inimene",es:"persona"},
{et:"tüdruk",es:"chica"}, {et:"poiss",es:"chico"}, {et:"kus",es:"dónde"},
{et:"mis",es:"qué"}, {et:"kes",es:"quién"}, {et:"millal",es:"cuándo"},
{et:"miks",es:"por qué"}, {et:"kuidas",es:"cómo"}, {et:"siin",es:"aquí"},
{et:"seal",es:"allí"}, {et:"praegu",es:"ahora"}, {et:"hiljem",es:"después"},
{et:"hea",es:"bueno"}, {et:"halb",es:"malo"}, {et:"ilus",es:"bonito"},
{et:"suur",es:"grande"}, {et:"väike",es:"pequeño"}, {et:"uus",es:"nuevo"},
{et:"vana",es:"viejo"}, {et:"kiire",es:"rápido"}, {et:"aeglane",es:"lento"},
{et:"lihtne",es:"fácil"}, {et:"ma söön",es:"como"},
{et:"ma joon",es:"bebo"}, {et:"ma lähen",es:"voy"}, {et:"ma tulen",es:"vengo"},
{et:"ma näen",es:"veo"}, {et:"ma kuulen",es:"oigo"},
{et:"ma räägin",es:"hablo"}, {et:"ma õpin",es:"aprendo"},
{et:"ma töötan",es:"trabajo"}, {et:"ma puhkan",es:"descanso"},
{et:"päev",es:"día"}, {et:"öö",es:"noche"}, {et:"hommik",es:"mañana"},
{et:"õhtu",es:"tarde"}, {et:"linn",es:"ciudad"}, {et:"küla",es:"pueblo"},
{et:"riik",es:"país"}, {et:"tee",es:"camino"}, {et:"tänav",es:"calle"},
{et:"kodu",es:"hogar"}, {et:"auto",es:"coche"}, {et:"buss",es:"autobús"},
{et:"rong",es:"tren"}, {et:"lennuk",es:"avión"}, {et:"uks",es:"puerta"},
{et:"aken",es:"ventana"}, {et:"laud",es:"mesa"}, {et:"tool",es:"silla"},
{et:"voodi",es:"cama"}, {et:"raamat",es:"libro"}, {et:"muusika",es:"música"},
{et:"film",es:"película"}, {et:"ilm",es:"clima"}, {et:"küsimus",es:"pregunta"},
{et:"vastus",es:"respuesta"}
];

/* KAARDID */
let shuffled=[], index=0, flipped=false;

function startCards(){
    showOnly("cards");
    shuffled=[...words];
    index=0;
    showCard();
}
function showCard(){
    flipped=false;
    cardBox.innerText=shuffled[index].et;
    cardInfo.innerText=`${index+1} / ${shuffled.length}`;
}
function flipCard(){
    cardBox.innerText=flipped ? shuffled[index].et : shuffled[index].es;
    flipped=!flipped;
}
function nextCard(){ if(index<shuffled.length-1){ index++; showCard(); } }
function prevCard(){ if(index>0){ index--; showCard(); } }

/* TEST */
let score=0, testIndex=0;

function startTest(){
    showOnly("test");
    score=0; scoreSpan.innerText=0;
    testIndex=0;
    showQuestion();
}
function showQuestion(){
    const w=words[testIndex];
    question.innerText=w.et;

    let opts=[w.es];
    while(opts.length<4){
        let r=words[Math.floor(Math.random()*words.length)].es;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(()=>Math.random()-0.5);

    optionsBox.innerHTML=opts.map(o =>
        `<button class="option" onclick="check('${o}')">${o}</button>`
    ).join("");
}
function check(a){
    if(a===words[testIndex].es) score++;
    scoreSpan.innerText=score;
}
function nextQuestion(){ if(testIndex<words.length-1){ testIndex++; showQuestion(); } }
function prevQuestion(){ if(testIndex>0){ testIndex--; showQuestion(); } }

/* SÕNALOEND (NUMMEREERITUD) */
function showList(){
    showOnly("list");
    wordList.innerHTML=words.map((w,i)=>
        `<div class="word"><strong>${i+1}.</strong><span>${w.et}</span> – <span>${w.es}</span></div>`
    ).join("");
}
</script>
</body>
</html>
